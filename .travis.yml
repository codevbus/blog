language: python
python:
- '3.6'
cache: pip
branches:
  only:
  - master
install:
- pip install -r requirements.txt
script:
- git clone https://github.com/alexandrevicenzi/Flex.git
- pelican-themes -vi Flex
- pelican content
- python test_blog.py
notifications:
  email:
    on_failure: always
deploy:
  provider: s3
  bucket: sysengcooking.com
  endpoint: sysengcooking.com.s3-website.us-east-2.amazonaws.com
  acl: public_read
  region: us-east-2
  on:
    repo: codevbus/blog
  access_key_id:
    secure: 
  secret_access_key:
    secure: 
after_deploy:
- aws configure set preview.cloudfront true
- aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_ID
