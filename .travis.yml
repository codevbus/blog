language: python
python:
- '3.6'
cache: pip
branches:
  only:
  - master
install:
- pip install -r requirements.txt
script:
- git clone https://github.com/alexandrevicenzi/Flex.git
- pelican-themes -vi Flex
- make clean
- make html
- python test_blog.py
before_deploy:
- rm -rf content/ Flex/ README.md fabfile.py pelicanconf.py publishconf.py test_blog.py requirements.txt Makefile develop_server.sh
deploy:
  on:
    branch: master
  provider: s3
  bucket: sysengcooking.com
  skip_cleanup: true
  local_dir: ./output
  region: us-east-2
after_deploy:
- aws configure set preview.cloudfront true
- aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_ID --paths "/*"
notifications:
  email:
    on_failure: always
env:
  global:
  - secure: 
  - secure: 
